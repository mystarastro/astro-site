<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Astrology Website</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

body {
  margin:0;
  font-family:'Montserrat', sans-serif;
  background: radial-gradient(ellipse at center, #0b0033 0%, #1a0a4a 100%);
  color:#fff;
  overflow-x:hidden;
  position:relative;
}
h1 {
  margin-top:60px;
  font-size:2.4em;
  text-shadow: 0 0 25px #a36cff;
  text-align:center;
}
.lang-switch {
  position:absolute;
  top:15px;
  right:15px;
  background:rgba(255,255,255,0.1);
  padding:6px 12px;
  border-radius:5px;
  cursor:pointer;
  font-weight:bold;
}

/* 星空星星 */
.star, .shooting-star {
  position:absolute;
  border-radius:50%;
  background:#fff;
  opacity:0.8;
}
.shooting-star {
  width:2px;
  height:2px;
  animation:shoot 2s linear infinite;
}
@keyframes shoot {
  0% {transform:translate(0,0);opacity:1;}
  100% {transform:translate(800px,400px);opacity:0;}
}

/* 输入区 */
.input-container {
  margin-top:30px;
  text-align:center;
}
.input-container input {
  padding:12px;
  margin:5px;
  border:none;
  border-radius:8px;
  font-size:1em;
  width:calc(28% - 10px);
  min-width:100px;
}
button {
  padding:12px 25px;
  border:none;
  border-radius:10px;
  font-size:1em;
  cursor:pointer;
  margin-top:10px;
  background: linear-gradient(90deg, #6a00ff, #c000ff);
  color:white;
  transition: all 0.3s;
}
button:hover { box-shadow:0 0 25px #fff; transform:scale(1.05); }

/* 结果卡片 */
.result-card {
  margin:30px auto;
  max-width:460px;
  padding:25px;
  background: rgba(255,255,255,0.08);
  border-radius:20px;
  box-shadow:0 0 25px rgba(255,255,255,0.25);
  display:none;
  text-align:left;
  animation:fadein 1s;
}
@keyframes fadein {from{opacity:0;}to{opacity:1;}}
.result-card p { margin:12px 0; line-height:1.6em; font-size:1em; }

/* 付费按钮 */
.pay-btn {
  width:100%;
  padding:14px 0;
  font-size:1.15em;
  font-weight:bold;
  border-radius:15px;
  border:none;
  background: linear-gradient(90deg, #ff6a00, #ffb84d);
  cursor:pointer;
  transition: all 0.3s;
  margin-top:15px;
}
.pay-btn:hover { box-shadow:0 0 30px #ffb84d; transform:scale(1.05); }

/* 脚注 */
footer { margin-top:50px; font-size:0.85em; color:#ccc; text-align:center; }

/* 响应式 */
@media(max-width:500px){
  .input-container input { width:80%; margin:5px 0; }
  .result-card { width:90%; }
}
</style>
</head>
<body>

<div class="lang-switch" onclick="switchLang()">EN / MS</div>

<h1 id="title">✨ Carta Lahir Astrology ✨</h1>

<div class="input-container">
  <input type="date" id="birthdate">
  <input type="time" id="birthtime">
  <input type="text" id="birthplace" placeholder="Bandar / City">
  <br>
  <button onclick="calculateSign()">Kira / Calculate</button>
</div>

<div class="result-card" id="result">
  <p id="sunSign"></p>
  <p id="moonSign"></p>
  <p id="risingSign"></p>
  <button class="pay-btn" onclick="payNow()">RM9.90 - Akan Datang / Unlock</button>
</div>

<footer>
Kandungan ini hanya untuk hiburan sahaja - Content for Entertainment Only
</footer>

<script>
// 生成星星
for(let i=0;i<120;i++){
  let star=document.createElement('div');
  star.className='star';
  star.style.top=Math.random()*100+'%';
  star.style.left=Math.random()*100+'%';
  let size=Math.random()*2+1+'px';
  star.style.width=size; star.style.height=size;
  star.style.opacity=Math.random();
  document.body.appendChild(star);
}

// 双语切换
let lang='ms';
function switchLang(){ lang=(lang==='ms')?'en':'ms'; updateText(); }
function updateText(){
  if(lang==='ms'){
    document.getElementById('title').innerText='✨ Carta Lahir Astrology ✨';
    document.getElementById('birthplace').placeholder='Bandar / City';
    document.querySelector('.input-container button').innerText='Kira / Calculate';
    document.querySelector('.pay-btn').innerText='RM9.90 - Akan Datang';
  } else {
    document.getElementById('title').innerText='✨ Astrology Birth Chart ✨';
    document.getElementById('birthplace').placeholder='City';
    document.querySelector('.input-container button').innerText='Calculate';
    document.querySelector('.pay-btn').innerText='RM9.90 - Coming Soon';
  }
}

// 占星文案
const sunTexts = {
  Aries:"🌟 Berani & penuh semangat. Hari ini, beri diri peluang bersinar.",
  Taurus:"🌿 Stabil & penyayang. Rehat sebentar & nikmati ketenangan.",
  Gemini:"💫 Bijak & fleksibel. Fikirkan idea baru hari ini.",
  Cancer:"🌙 Sensitif & penyayang. Perhatikan hati sendiri.",
  Leo:"🔥 Bercahaya & berani. Biarkan kehangatan anda menyinari orang lain.",
  Virgo:"🍃 Teliti & peduli. Fokus pada apa yang menenangkan.",
  Libra:"⚖️ Harmoni & penyayang. Senyum pada diri sendiri.",
  Scorpio:"🦂 Misteri & mendalam. Hadapi perasaan dengan berani.",
  Sagittarius:"🏹 Ceria & bebas. Biarkan diri bermimpi besar.",
  Capricorn:"⛰️ Disiplin & fokus. Capai satu matlamat kecil.",
  Aquarius:"💎 Unik & kreatif. Kongsikan idea anda dengan dunia.",
  Pisces:"🌊 Sensitif & intuitif. Beri masa untuk imaginasi."
};
const moonRisingTexts={ms:"🌟 Bulan & Ascendant misteri. Unlock RM9.90 untuk rahsia diri anda.",en:"🌟 Your Moon & Ascendant hide secrets. Unlock RM9.90 to reveal your true self"};

function calculateSign(){
  let date=document.getElementById('birthdate').value;
  if(!date){ alert(lang==='ms'?'Sila pilih tarikh lahir':'Please select birth date'); return;}
  document.getElementById('result').style.display='block';
  let sun=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  let sunSign=sun[Math.floor(Math.random()*12)];
  document.getElementById('sunSign').innerText=(lang==='ms'?'Matahari / Sun: ':'Sun Sign: ')+sunSign+"\n"+sunTexts[sunSign];
  document.getElementById('moonSign').innerText=(lang==='ms'?'Bulan / Moon: ???':'Moon Sign: ???')+"\n"+moonRisingTexts[lang];
  document.getElementById('risingSign').innerText=(lang==='ms'?'Rising / Ascendant: ???':'Rising Sign: ???')+"\n"+moonRisingTexts[lang];
}
function payNow(){
  alert(lang==='ms'?'🌟 RM9.90 Akan Datang! Unlock rahsia diri anda':'🌟 RM9.90 Coming Soon! Unlock your true self');
}
updateText();
</script>

</body>
</html>
